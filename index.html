<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0b1c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guide TV">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Guide TV Suisse</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b1c;--bg2:#0e0e22;--card:#141428;--card2:#1c1c38;
  --border:rgba(255,255,255,0.08);--accent:#FF6635;--live:#00D084;--blue:#4D8EF0;
  --text:#eeeef8;--text2:#8888aa;--text3:#44445e;--r:13px;--rs:8px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);--safe-r:env(safe-area-inset-right,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Outfit','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none;overflow:hidden}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:none}
input,textarea{font-family:inherit;-webkit-appearance:none;-webkit-user-select:text!important;user-select:text!important;-webkit-touch-callout:default!important;}
#shell{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* SPLASH */
#upd{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .5s,visibility .5s}
#upd.gone{opacity:0;visibility:hidden;pointer-events:none}
.upd-icon{width:80px;height:80px;border-radius:22px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:38px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,102,53,.4)}50%{box-shadow:0 0 0 18px rgba(255,102,53,0)}}
.upd-t{font-size:24px;font-weight:800}.upd-t em{color:var(--accent);font-style:normal}
.upd-s{font-size:13px;color:var(--text2);text-align:center;max-width:280px;line-height:1.6}
.upd-track{width:200px;height:3px;background:var(--card2);border-radius:2px;overflow:hidden}
.upd-fill{height:100%;width:0;background:var(--accent);border-radius:2px;transition:width .1s linear}
.upd-ok{font-size:13px;font-weight:700;opacity:0;transition:opacity .4s;text-align:center}
.upd-ok.show{opacity:1}

/* TOPBAR */
#topbar{flex-shrink:0;padding-top:var(--safe-t);padding-left:calc(12px + var(--safe-l));padding-right:calc(12px + var(--safe-r));height:calc(54px + var(--safe-t));display:flex;align-items:center;gap:8px;background:var(--bg);border-bottom:1px solid var(--border);z-index:10}
#btn-back{display:none;width:34px;height:34px;border-radius:var(--rs);background:var(--card2);color:var(--text);font-size:18px;align-items:center;justify-content:center;flex-shrink:0}
#btn-back.on{display:flex}
#logo{font-size:19px;font-weight:800;flex:1;letter-spacing:-.3px}
#logo em{color:var(--accent);font-style:normal}
#ch-title{display:none;flex:1;font-size:17px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#ch-title.on{display:block}
.tb-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--card2);border-radius:var(--rs);color:var(--text2);font-size:16px;transition:all .18s;flex-shrink:0}
.tb-btn.on{background:rgba(255,102,53,.2);color:var(--accent)}

/* SEARCH BAR */
#srch-wrap{flex-shrink:0;max-height:0;overflow:hidden;background:var(--bg2);transition:max-height .28s ease}
#srch-wrap.open{max-height:52px;border-bottom:1px solid var(--border)}
#srch-inner{height:52px;display:flex;align-items:center;gap:8px;padding:0 calc(12px + var(--safe-l))}
#srch-in{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:15px;padding:8px 12px;outline:none;transition:border-color .2s}
#srch-in:focus{border-color:var(--accent)}
#srch-in::placeholder{color:var(--text3)}

/* DATE STRIP */
#datestrip{flex-shrink:0;height:48px;display:flex;align-items:center;gap:4px;overflow-x:auto;padding:0 calc(10px + var(--safe-l));scrollbar-width:none;background:var(--bg2);border-bottom:1px solid var(--border)}
#datestrip::-webkit-scrollbar{display:none}
.dp{flex-shrink:0;padding:4px 12px;border-radius:16px;font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;color:var(--text2);border:1px solid transparent;transition:all .16s}
.dp.past{color:var(--text3)}.dp.today{border-color:var(--accent);color:var(--accent)}
.dp.sel{background:var(--accent);color:#fff;font-weight:700}
.dp.past.sel{background:var(--text3);border-color:var(--text3)}

/* PANE */
#content{flex:1;overflow:hidden;position:relative}
#pane{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:10px;padding-bottom:calc(16px + var(--safe-b));scrollbar-width:thin;scrollbar-color:var(--card2) transparent}
#pane::-webkit-scrollbar{width:2px}
#pane::-webkit-scrollbar-thumb{background:var(--card2)}

/* STATUS BAR */
#status-bar{flex-shrink:0;height:22px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;font-size:10.5px;color:var(--text3)}
.st-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.st-dot.live{background:var(--live)}
.st-dot.warn{background:#FFA500}

/* GRID */
.ch-grid{display:flex;flex-direction:column;gap:7px}
.ch-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;display:flex;align-items:stretch;transition:transform .14s,background .14s}
.ch-card:active{transform:scale(.982);background:var(--card2)}
.ch-stripe{width:4px;flex-shrink:0}
.ch-logo-wrap{width:52px;height:52px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:9px 0 9px 10px;border-radius:9px;overflow:hidden;background:rgba(255,255,255,0.05)}
.ch-logo-wrap img{width:100%;height:100%;object-fit:contain;padding:4px}
.ch-logo-fb{width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0;border-radius:9px;margin:9px 0 9px 10px;letter-spacing:-.2px}
.ch-body{flex:1;min-width:0;padding:9px 12px 8px}
.ch-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:3px}
.ch-show{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-row2{display:flex;align-items:center;gap:6px;margin-top:3px;font-size:12px;color:var(--text2)}
.live-pill{padding:1px 6px;background:var(--live);color:#000;border-radius:4px;font-size:9.5px;font-weight:800;letter-spacing:.3px}
.ch-prog{height:2px;background:var(--card2);border-radius:1px;margin:6px 0 3px;overflow:hidden}
.ch-prog-bar{height:100%;border-radius:1px}
.ch-nxt{font-size:11.5px;color:var(--text3)}
.ch-nxt b{color:var(--text2);font-weight:500}

/* SCHEDULE */
.sch-hdr{display:flex;align-items:center;gap:12px;padding:0 2px 14px}
.sch-hlogo{width:48px;height:48px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sch-hlogo img{width:100%;height:100%;object-fit:contain;padding:4px}
.sch-hname{font-size:18px;font-weight:800}
.sch-hdate{font-size:12px;color:var(--text2);margin-top:2px}
.sch-src{font-size:10px;margin-top:2px}
.sch-src.real{color:var(--live)}
.sch-src.local{color:var(--text3);font-style:italic}
.sch-list{display:flex;flex-direction:column}
.sch-row{display:flex;align-items:flex-start;gap:10px;padding:12px 4px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;border-radius:var(--rs)}
.sch-row:last-child{border-bottom:none}
.sch-row:active{background:var(--card)}
.sch-row.past{opacity:.35}
.sch-row.live-row{background:rgba(0,208,132,.05);padding:12px 8px;margin:0 -4px;border-left:3px solid var(--live)}
.sch-row.live-row .sch-time{color:var(--live)}
.sch-tcol{width:50px;flex-shrink:0;text-align:right}
.sch-time{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.sch-tend{font-size:11px;color:var(--text3);margin-top:2px}
.sch-tl{width:16px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:5px}
.sch-dot{width:9px;height:9px;border-radius:50%;background:var(--card2);border:2px solid var(--text3);flex-shrink:0}
.sch-dot.live{background:var(--live);border-color:var(--live);box-shadow:0 0 6px var(--live)}
.sch-line{width:1px;flex:1;min-height:20px;background:var(--border);margin-top:3px}
.sch-body{flex:1;min-width:0}
.sch-name{font-size:15px;font-weight:600;line-height:1.3}
.sch-row.live-row .sch-name{color:var(--live)}
.sch-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
.tag-live{background:rgba(0,208,132,.15);color:var(--live)}
.tag-g{background:rgba(77,142,240,.13);color:var(--blue)}
.tag-d{background:var(--card2);color:var(--text3)}

/* SEARCH */
.s-empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px;color:var(--text3);text-align:center}
.s-day{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);padding:14px 2px 6px}
.s-row{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;margin-bottom:6px;cursor:pointer;transition:background .13s}
.s-row:active{background:var(--card2)}
.s-name{font-size:14px;font-weight:600;margin-bottom:4px}
.s-meta{font-size:12px;color:var(--text2);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.s-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
mark.hl{background:rgba(255,102,53,.25);border-radius:2px;color:inherit;padding:0 1px}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#modal-bg.open{display:block}
#modal-sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--card);border-radius:18px 18px 0 0;border:1px solid rgba(255,255,255,.1);border-bottom:none;max-height:88dvh;overflow-y:auto;transform:translateY(100%);transition:transform .36s cubic-bezier(.32,.72,0,1);padding-bottom:calc(20px + var(--safe-b))}
#modal-sheet.open{transform:translateY(0)}
.m-pill{width:34px;height:4px;background:var(--card2);border-radius:2px;margin:10px auto 0}
.m-top{display:flex;align-items:center;gap:8px;padding:13px 16px 0}
.m-badge{height:28px;padding:0 10px;border-radius:6px;font-size:10px;font-weight:800;color:#fff;display:inline-flex;align-items:center}
.m-dt{font-size:12px;color:var(--text2);flex:1}
.m-close{width:28px;height:28px;background:var(--card2);border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.m-title{font-size:20px;font-weight:800;padding:9px 16px 5px;line-height:1.2}
.m-tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 16px 10px}
.m-tag{font-size:11.5px;padding:3px 8px;border-radius:5px;background:var(--card2);color:var(--text2)}
.m-sum{font-size:13.5px;line-height:1.7;color:var(--text2);padding:0 16px 14px}
.m-div{height:1px;background:var(--border);margin:0 16px 12px}
.m-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:0 16px 8px}
.rerun{display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.rerun:last-child{border-bottom:none}
.rerun:active{background:var(--card2)}
.rr-d{font-size:12.5px;font-weight:600;width:90px;flex-shrink:0}
.rr-t{font-size:12.5px;color:var(--text2);width:48px;flex-shrink:0}
.rr-b{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:4px;color:#fff}
.rr-none{padding:8px 16px 4px;font-size:13px;color:var(--text3)}
.m-acts{padding:14px 16px 0;display:flex;gap:8px}
.btn-mail{flex:1;height:46px;background:var(--accent);color:#fff;border-radius:var(--rs);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .16s}
.btn-mail:active{opacity:.8}

/* SETTINGS */
#sp-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#sp-bg.open{display:block}
#sp-panel{position:fixed;top:0;right:0;bottom:0;z-index:201;width:min(320px,92vw);background:var(--card);border-left:1px solid rgba(255,255,255,.1);overflow-y:auto;padding-top:var(--safe-t);padding-bottom:calc(24px + var(--safe-b));transform:translateX(100%);transition:transform .36s cubic-bezier(.32,.72,0,1)}
#sp-panel.open{transform:translateX(0)}
.sp-h{padding:16px 16px 13px;font-size:18px;font-weight:800;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sp-x{width:28px;height:28px;background:var(--card2);border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.sp-s{padding:14px 16px;border-bottom:1px solid var(--border)}
.sp-st{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:9px}
.sp-lbl{font-size:12px;color:var(--text2);margin-bottom:4px}
.sp-in{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;padding:9px 11px;outline:none;transition:border-color .2s;-webkit-user-select:text!important;user-select:text!important}
.sp-in:focus{border-color:var(--accent)}
.ct-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--border)}
.ct-row:last-child{border-bottom:none}
.ct-logo{width:32px;height:32px;border-radius:6px;overflow:hidden;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ct-logo img{width:100%;height:100%;object-fit:contain;padding:3px}
.ct-name{font-size:13px;font-weight:600}.ct-cc{font-size:11px;color:var(--text3);margin-top:1px}
.tgl{width:42px;height:24px;border-radius:12px;background:var(--card2);position:relative;transition:background .2s;flex-shrink:0;border:none}
.tgl.on{background:var(--accent)}
.tgl::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tgl.on::after{transform:translateX(18px)}
.sp-btn{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:13.5px;text-align:left;display:flex;align-items:center;gap:8px;margin-bottom:6px;transition:background .14s}
.sp-btn:active{background:var(--card2)}
.sp-btn.red{color:#ff5566}
.sp-ver{text-align:center;font-size:11px;color:var(--text3);padding:14px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;gap:8px;color:var(--text3);font-size:14px;text-align:center;padding:20px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .22s ease both}
@media(min-width:600px){.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}}
@media(min-width:900px){.ch-grid{grid-template-columns:1fr 1fr 1fr}}
@media(orientation:landscape) and (max-height:480px){.ch-grid{display:grid;grid-template-columns:1fr 1fr}}
@media(min-width:620px){
  #modal-sheet{max-width:540px;left:50%;right:auto;transform:translate(-50%,100%);border-radius:18px}
  #modal-sheet.open{transform:translate(-50%,0)}}
</style>
</head>
<body>
<div id="shell">
  <div id="upd">
    <div class="upd-icon">📺</div>
    <div class="upd-t">Guide <em>TV</em> Suisse</div>
    <div class="upd-s" id="upd-msg">Connexion aux données en direct…</div>
    <div class="upd-track"><div class="upd-fill" id="upd-fill"></div></div>
    <div class="upd-ok" id="upd-ok"></div>
  </div>

  <header id="topbar">
    <button id="btn-back" onclick="goBack()">←</button>
    <div id="logo">Guide <em style="color:var(--accent);font-style:normal">TV</em></div>
    <div id="ch-title"></div>
    <div style="display:flex;gap:6px">
      <button class="tb-btn" id="btn-srch" onclick="toggleSearch()">🔍</button>
      <button class="tb-btn" onclick="openSettings()">⚙️</button>
    </div>
  </header>

  <div id="srch-wrap">
    <div id="srch-inner">
      <input type="search" id="srch-in" placeholder="Émission, genre, chaîne…" autocomplete="off" spellcheck="false" oninput="onSearch(this.value)">
      <button style="width:28px;height:28px;color:var(--text3);font-size:17px;display:flex;align-items:center;justify-content:center" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div id="status-bar">
    <div class="st-dot" id="st-dot"></div>
    <span id="st-txt">Chargement…</span>
  </div>

  <nav id="datestrip"></nav>
  <div id="content"><div id="pane"></div></div>
</div>

<div id="modal-bg" onclick="closeModal()"></div>
<div id="modal-sheet">
  <div class="m-pill"></div>
  <div class="m-top">
    <span class="m-badge" id="m-badge"></span>
    <span class="m-dt" id="m-dt"></span>
    <button class="m-close" onclick="closeModal()">✕</button>
  </div>
  <div class="m-title" id="m-title"></div>
  <div class="m-tags" id="m-tags"></div>
  <div class="m-sum" id="m-sum"></div>
  <div class="m-div"></div>
  <div class="m-sec">🔁 Rediffusions</div>
  <div id="m-reruns"></div>
  <div class="m-acts">
    <button class="btn-mail" onclick="sendMail()">✉️ &nbsp;Envoyer par e-mail</button>
  </div>
</div>

<div id="sp-bg" onclick="closeSettings()"></div>
<div id="sp-panel">
  <div class="sp-h">Réglages <button class="sp-x" onclick="closeSettings()">✕</button></div>
  <div class="sp-s">
    <div class="sp-st">✉️ E-mail</div>
    <div class="sp-lbl">Adresse pour les rappels</div>
    <input type="email" class="sp-in" id="sp-email" placeholder="vous@email.ch" oninput="saveEmail(this.value)">
  </div>
  <div class="sp-s">
    <div class="sp-st">📺 Chaînes actives</div>
    <div id="ch-toggles"></div>
  </div>
  <div class="sp-s">
    <div class="sp-st">⚙️ Application</div>
    <button class="sp-btn" onclick="forceRefresh()">🔄 Actualiser les données</button>
    <button class="sp-btn" onclick="clearCache()">🗑️ Vider le cache</button>
    <button class="sp-btn red" onclick="resetAll()">↺ Réinitialiser</button>
  </div>
  <div class="sp-ver">Guide TV Suisse v2.0 · Données : EPG.pw</div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════════
   CONFIG
══════════════════════════════════════════════ */
const PAST = 1, FUT = 6;  // EPG: 1 jour passé, 6 futurs (limitation API gratuite)
const TTL = 4 * 3600000;  // cache 4h
// CORS proxy pour contourner les restrictions navigateur
const PROXY = 'https://api.allorigins.win/raw?url=';
const EPG_BASE = 'https://epg.pw/api/epg.xml';

/* ══════════════════════════════════════════════
   CATALOGUE — epgId = identifiant EPG.pw
   logo = URL image réelle de la chaîne
══════════════════════════════════════════════ */
const BASE_CATALOG = [
  // Suisse RTS
  { id:'rts1',  name:'RTS 1',       epgId:'RTS1.ch',          cc:'CH', color:'#D01414', abbr:'RTS1',

};

/* ══════════════════════════════════════════════
   EPG FETCH + PARSE (XMLTV)
══════════════════════════════════════════════ */
function parseXMLTV(xmlText, chId, date) {
  try {
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    if (doc.querySelector('parsererror')) return null;
    const progs = Array.from(doc.querySelectorAll('programme'));
    if (!progs.length) return null;

    return progs.map((p, i) => {
      const startRaw = p.getAttribute('start') || '';
      const stopRaw  = p.getAttribute('stop') || '';
      const title    = p.querySelector('title')?.textContent?.trim() || '—';
      const desc     = p.querySelector('desc')?.textContent?.trim() || '';
      const cats     = Array.from(p.querySelectorAll('category')).map(c => c.textContent.trim()).filter(Boolean);
      const epNum    = p.querySelector('episode-num')?.textContent?.trim() || '';

      function parseEPGTime(raw) {
        // format: "20240115183000 +0100"
        const m = raw.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})/);
        if (!m) return null;
        const utc = Date.UTC(+m[1], +m[2]-1, +m[3], +m[4], +m[5], +m[6]);
        const offset = raw.includes('+') ? parseInt(raw.split('+')[1]) : -parseInt(raw.split('-')[1]);
        const offMs = Math.floor(offset / 100) * 3600000 + (offset % 100) * 60000;
        return new Date(utc - offMs);
      }

      const startD = parseEPGTime(startRaw);
      const stopD  = parseEPGTime(stopRaw);
      if (!startD) return null;

      // Convert to local time strings
      const localStart = startD.toLocaleTimeString('fr-CH', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Paris' });
      const localStop  = stopD ? stopD.toLocaleTimeString('fr-CH', { hour:'2-digit', minute:'2-digit', timeZone:'Europe/Paris' }) : null;
      const dur = stopD ? Math.round((stopD - startD) / 60000) : 30;
      const localDate = startD.toLocaleDateString('fr-CA', { timeZone:'Europe/Paris' }); // YYYY-MM-DD

      // Build full name with episode info
      let name = title;
      const subTitle = p.querySelector('sub-title')?.textContent?.trim();
      if (subTitle && subTitle !== title) name = title + ' — ' + subTitle;

      return {
        _id: `E:${chId}:${i}`,
        channelId: chId,
        date: localDate,
        time: localStart,
        endTime: localStop,
        runtime: dur,
        name,
        showName: title,
        genres: cats.length ? cats : ['Divers'],
        summary: desc,
        showId: null,
        _real: true,
      };
    }).filter(Boolean).sort((a, b) => a.time.localeCompare(b.time));
  } catch (e) {
    return null;
  }
}

async function fetchEPGForChannel(ch, date) {
  const key = `epg:${ch.epgId}:${date}`;
  const cached = LS.get(key);
  if (cached) return cached;

  const url = `${EPG_BASE}?channel_id=${encodeURIComponent(ch.epgId)}&date=${date}`;
  const proxyUrl = PROXY + encodeURIComponent(url);

  try {
    const r = await fetch(proxyUrl, { signal: AbortSignal.timeout(8000) });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const xml = await r.text();
    const shows = parseXMLTV(xml, ch.id, date);
    if (shows && shows.length >= 3) {
      LS.set(key, shows);
      return shows;
    }
    return null;
  } catch {
    return null;
  }
}

async function loadAllEPG() {
  const dates = dateRange();
  const jobs = [];
  for (const ch of ST.channels) {
    for (const d of dates) {
      jobs.push({ ch, d });
    }
  }

  totalFetched = jobs.length;
  let done = 0;

  await Promise.all(jobs.map(async ({ ch, d }) => {
    const shows = await fetchEPGForChannel(ch, d);
    if (!ST.epgData[ch.id]) ST.epgData[ch.id] = {};
    ST.epgData[ch.id][d] = shows || false;
    if (shows && shows.length) realCount++;
    done++;
    const pct = Math.round(done / totalFetched * 100);
    document.getElementById('upd-fill').style.width = pct + '%';
    document.getElementById('upd-msg').textContent = `Chargement… ${pct}%`;
  }));
}

function localFallback(chId, date) {
  const sch = LOCAL_SCHED[chId];
  if (!sch) return genericFallback(chId, date);
  const lines = isWeekend(date) ? sch.we : sch.wd;
  return lines.map((line, i) => {
    const [time, name, genre, durStr] = line.split('|');
    const dur = parseInt(durStr) || 30;
    const [h, m] = time.split(':').map(Number);
    const tot = h * 60 + m + dur;
    const et = pad(Math.floor(tot / 60) % 24) + ':' + pad(tot % 60);
    return { _id: `L:${chId}:${i}`, channelId: chId, date, time, endTime: et, runtime: dur, name, showName: name, genres: [genre], summary: '', showId: null, _real: false };
  });
}

function genericFallback(chId, date) {
  const slots = [['06:00','Magazine matin','Magazine',120],['08:00','Série','Série',50],['09:00','Documentaire','Documentaire',55],['10:00','Documentaire','Documentaire',55],['12:00','Journal','Info',30],['12:30','Magazine','Magazine',60],['13:30','Film','Cinéma',110],['15:20','Série','Série',50],['16:10','Série','Série',50],['17:00','Magazine','Magazine',55],['18:00','Journal','Info',30],['18:30','Magazine','Magazine',55],['19:30','Journal','Info',30],['20:00','Prime time','Divertissement',120],['22:00','Série de soirée','Série',50],['22:50','Film de nuit','Cinéma',100]];
  return slots.map(([time, name, genre, dur], i) => {
    const [h, m] = time.split(':').map(Number), tot = h * 60 + m + dur;
    const et = pad(Math.floor(tot / 60) % 24) + ':' + pad(tot % 60);
    return { _id: `G:${chId}:${i}`, channelId: chId, date, time, endTime: et, runtime: dur, name, showName: name, genres: [genre], summary: '', showId: null, _real: false };
  });
}

function getShows(chId, date) {
  const epg = ST.epgData[chId];
  if (epg && epg[date] && Array.isArray(epg[date]) && epg[date].length >= 3) {
    // Filter to only shows for this date
    return epg[date].filter(s => s.date === date);
  }
  return localFallback(chId, date);
}

function isRealData(chId, date) {
  const epg = ST.epgData[chId];
  return epg && epg[date] && Array.isArray(epg[date]) && epg[date].length >= 3;
}

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
function todayStr() { return new Date().toISOString().slice(0, 10); }
function offDay(n) { const d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }
function dateRange() { return Array.from({ length: PAST + FUT + 1 }, (_, i) => offDay(-PAST + i)); }
function pad(n) { return String(n).padStart(2, '0'); }
function nowMins() { const n = new Date(); return n.getHours() * 60 + n.getMinutes(); }
function t2m(t = '') { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; }

function isLive(s, date) {
  if (date !== todayStr()) return false;
  const nm = nowMins(), st = t2m(s.time);
  const en = s.endTime ? t2m(s.endTime) : st + (s.runtime || 30);
  const enAdj = en <= st ? en + 1440 : en;
  return nm >= st && nm < enAdj;
}
function isPast(s, date) {
  const t = todayStr();
  if (date < t) return true; if (date > t) return false;
  const nm = nowMins(), st = t2m(s.time);
  const en = s.endTime ? t2m(s.endTime) : st + (s.runtime || 30);
  return nm >= (en <= st ? en + 1440 : en);
}
function progress(s) {
  const nm = nowMins(), st = t2m(s.time);
  const en = s.endTime ? t2m(s.endTime) : st + (s.runtime || 30);
  const dur = (en <= st ? en + 1440 : en) - st;
  return dur <= 0 ? 0 : Math.min(100, Math.max(0, (nm - st) / dur * 100));
}
function nowShows(chId, date) {
  const shows = getShows(chId, date), nm = nowMins(), t = todayStr();
  if (!shows.length) return { cur: null, nxt: null };
  if (date !== t) return { cur: shows[0], nxt: shows[1] || null };
  let cur = null, nxt = null;
  for (let i = 0; i < shows.length; i++) {
    const s = shows[i], st = t2m(s.time), en = s.endTime ? t2m(s.endTime) : st + (s.runtime || 30);
    const enAdj = en <= st ? en + 1440 : en;
    if (nm >= st && nm < enAdj) { cur = s; nxt = shows[i + 1] || null; break; }
    if (st > nm && !nxt) { nxt = s; if (i > 0) cur = shows[i - 1]; }
  }
  if (!cur && shows.length) cur = shows[shows.length - 1];
  return { cur, nxt };
}
function findReruns(show) {
  const out = [], tgt = (show.showName || show.name || '').toLowerCase(), seen = new Set();
  for (const d of dateRange()) {
    for (const ch of ST.channels) {
      for (const s of getShows(ch.id, d)) {
        if ((s.showName || s.name || '').toLowerCase() !== tgt) continue;
        if (s.date === show.date && s.time === show.time && ch.id === show.channelId) continue;
        const k = `${s.date}|${s.time}|${ch.id}`; if (seen.has(k)) continue; seen.add(k);
        out.push({ ...s, channelId: ch.id, chObj: ch });
      }
    }
  }
  return out.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time)).slice(0, 12);
}
function searchAll(q) {
  if (!q || q.length < 2) return [];
  const qn = norm(q); const out = [], seen = new Set();
  for (const d of dateRange()) {
    for (const ch of ST.channels) {
      for (const s of getShows(ch.id, d)) {
        if (!norm((s.name || '') + ' ' + s.genres.join(' ') + ' ' + (s.summary || '')).includes(qn)) continue;
        const k = `${s.name}|${d}|${s.time}|${ch.id}`; if (seen.has(k)) continue; seen.add(k);
        out.push({ ...s, channelId: ch.id, chObj: ch });
      }
    }
  }
  return out.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time));
}

function norm(s = '') { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
function esc(s = '') { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function hl(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return esc(text).replace(re, '<mark class="hl">$1</mark>');
}
function fmtDate(ds, short = false) {
  const t = todayStr();
  if (ds === t) return "Aujourd'hui";
  if (ds === offDay(-1)) return 'Hier';
  if (ds === offDay(1)) return 'Demain';
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('fr-CH', short ? { weekday: 'short', day: 'numeric', month: 'short' } : { weekday: 'long', day: 'numeric', month: 'long' });
}
function fmtStrip(ds) {
  const t = todayStr();
  if (ds === t) return "Auj.";
  if (ds === offDay(-1)) return 'Hier';
  if (ds === offDay(1)) return 'Dem.';
  const d = new Date(ds + 'T12:00:00');
  const wd = d.toLocaleDateString('fr-CH', { weekday: 'short' });
  return wd[0].toUpperCase() + wd.slice(1) + ' ' + d.getDate();
}

function renderStrip() {
  const t = todayStr(), el = document.getElementById('datestrip');
  el.innerHTML = dateRange().map(d => {
    const past = d < t, isT = d === t, sel = d === ST.date;
    return `<div class="dp${past ? ' past' : ''}${isT ? ' today' : ''}${sel ? ' sel' : ''}" onclick="selDate('${d}')">${fmtStrip(d)}</div>`;
  }).join('');
  setTimeout(() => { const a = el.querySelector('.sel'); if (a) a.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' }); }, 120);
}
function selDate(d) { ST.date = d; renderStrip(); if (ST.mode === 'grid') renderGrid(); else if (ST.mode === 'sched') renderSched(ST.chId); }

function renderGrid() {
  const pane = document.getElementById('pane');
  if (!ST.channels.length) { pane.innerHTML = '<div class="empty">📺<br>Aucune chaîne active<br>Ouvrez Réglages</div>'; return; }
  pane.innerHTML = '<div class="ch-grid">' + ST.channels.map((ch, i) => {
    const { cur, nxt } = nowShows(ch.id, ST.date);
    const live = cur && isLive(cur, ST.date);
    const pct = live ? progress(cur).toFixed(1) : 0;
    const real = isRealData(ch.id, ST.date);
    return `<div class="ch-card fu" style="animation-delay:${i * .03}s" onclick="openSched('${ch.id}')">
      <div class="ch-stripe" style="background:${ch.color}"></div>
      ${logoImg(ch, 48)}
      <div class="ch-body">
        <div class="ch-name">${esc(ch.name)}${real ? ' <span style="color:var(--live);font-size:8px">●</span>' : ''}</div>
        <div class="ch-show">${cur ? esc(cur.name) : '<span style="color:var(--text3);font-style:italic">Aucune info</span>'}</div>
        ${cur ? `<div class="ch-row2">${live ? '<span class="live-pill">EN DIRECT</span>' : ''}<span>${cur.time}${cur.endTime ? ' – ' + cur.endTime : ''}</span></div>` : ''}
        ${live ? `<div class="ch-prog"><div class="ch-prog-bar" style="width:${pct}%;background:${ch.color};opacity:.8"></div></div>` : '<div style="height:5px"></div>'}
        ${nxt ? `<div class="ch-nxt">→ ${nxt.time}&nbsp;<b>${esc(nxt.name)}</b></div>` : '<div style="height:2px"></div>'}
      </div>
    </div>`;
  }).join('') + '</div>';
}

function openSched(chId) {
  ST.mode = 'sched'; ST.chId = chId;
  const ch = CATALOG.find(c => c.id === chId) || {};
  document.getElementById('logo').style.display = 'none';
  const ct = document.getElementById('ch-title'); ct.textContent = ch.name || chId; ct.classList.add('on');
  document.getElementById('btn-back').classList.add('on');
  renderSched(chId);
}

function renderSched(chId) {
  const pane = document.getElementById('pane');
  const ch = CATALOG.find(c => c.id === chId) || {};
  const shows = getShows(chId, ST.date);
  const real = isRealData(chId, ST.date);
  const t = todayStr();

  let html = `<div class="sch-hdr fu">
    ${logoImg(ch, 48).replace('ch-logo-wrap', 'sch-hlogo').replace('ch-logo-fb', 'sch-hlogo')}
    <div>
      <div class="sch-hname">${esc(ch.name || chId)}</div>
      <div class="sch-hdate">${fmtDate(ST.date)}</div>
      <div class="sch-src ${real ? 'real' : 'local'}">${real ? '● Données en direct (EPG.pw)' : '○ Programme indicatif'}</div>
    </div>
  </div>`;

  if (!shows.length) { pane.innerHTML = html + '<div class="empty">😕<br>Aucune émission ce jour</div>'; return; }

  html += '<div class="sch-list fu">';
  shows.forEach((s, i) => {
    const live = isLive(s, ST.date), past = !live && isPast(s, ST.date);
    const cls = 'sch-row' + (past ? ' past' : '') + (live ? ' live-row' : '');
    const sid = stash({ ...s, channelId: chId, chObj: ch });
    html += `<div class="${cls}" onclick="openModal('${sid}')">
      <div class="sch-tcol"><div class="sch-time">${s.time}</div>${s.endTime ? `<div class="sch-tend">${s.endTime}</div>` : ''}</div>
      <div class="sch-tl"><div class="sch-dot${live ? ' live' : ''}"></div>${i < shows.length - 1 ? '<div class="sch-line"></div>' : ''}</div>
      <div class="sch-body">
        <div class="sch-name">${esc(s.name)}</div>
        <div class="sch-tags">
          ${live ? '<span class="tag tag-live">EN DIRECT</span>' : ''}
          ${s.genres.map(g => `<span class="tag tag-g">${esc(g)}</span>`).join('')}
          ${s.runtime ? `<span class="tag tag-d">${s.runtime} min</span>` : ''}
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  pane.innerHTML = html;

  if (ST.date === t) setTimeout(() => {
    const lv = pane.querySelector('.live-row');
    if (lv) lv.scrollIntoView({ block: 'center', behavior: 'smooth' });
    else { const rows = pane.querySelectorAll('.sch-row:not(.past)'); if (rows[0]) rows[0].scrollIntoView({ block: 'start', behavior: 'smooth' }); }
  }, 200);
}

function goBack() {

  document.getElementById('ch-title').classList.remove('on');

/* SEARCH */
function toggleSearch() {
  const open = document.getElementById('srch-wrap').classList.contains('open');
  if (!open) {
    document.getElementById('srch-wrap').classList.add('open');
    document.getElementById('btn-srch').classList.add('on');
    ST.mode = 'search'; renderSearchEmpty();
    setTimeout(() => document.getElementById('srch-in').focus(), 300);
  } else {
    document.getElementById('srch-wrap').classList.remove('open');
    document.getElementById('btn-srch').classList.remove('on');
    document.getElementById('srch-in').value = '';
    ST.mode = ST.chId ? 'sched' : 'grid';
    if (ST.chId) renderSched(ST.chId); else renderGrid();
  }
}
function clearSearch() { document.getElementById('srch-in').value = ''; renderSearchEmpty(); }
function onSearch(q) { if (!q) { renderSearchEmpty(); return; } renderSearchResults(searchAll(q), q); }
function renderSearchEmpty() {
  document.getElementById('pane').innerHTML = `<div class="s-empty"><div style="font-size:44px">🔍</div><div>Cherchez une émission, un genre ou une chaîne sur ${PAST + FUT + 1} jours.</div></div>`;
}
function renderSearchResults(res, q) {
  const pane = document.getElementById('pane');
  if (!res.length) { pane.innerHTML = `<div class="s-empty"><div style="font-size:44px">😕</div><div>Aucun résultat pour « ${esc(q)} »</div></div>`; return; }
  const by = {}; res.forEach(r => { (by[r.date] || (by[r.date] = [])).push(r); });
  let html = '<div class="fu">';
  for (const [d, items] of Object.entries(by)) {
    html += `<div class="s-day">${fmtDate(d)}</div>`;
    items.forEach(item => {
      const ch = item.chObj || CATALOG.find(c => c.id === item.channelId) || {};

      </div>`;
    });
  }

  document.getElementById('m-title').textContent = s.name || '';
  document.getElementById('m-tags').innerHTML = (s.genres || []).map(g => `<span class="m-tag">${esc(g)}</span>`).join('') + (s._real ? '<span class="m-tag" style="color:var(--live)">● Données réelles</span>' : '<span class="m-tag" style="color:var(--text3)">Programme indicatif</span>');

  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('modal-sheet').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); document.getElementById('modal-sheet').classList.remove('open'); ST.modal = null; }

function sendMail() {
  const s = ST.modal; if (!s) return;
  const ch = s.chObj || CATALOG.find(c => c.id === s.channelId) || {};
  const sub = encodeURIComponent('[Guide TV] ' + s.name + ' – ' + fmtDate(s.date));
  const body = encodeURIComponent(`Émission sélectionnée depuis Guide TV Suisse\n\n📺 Chaîne   : ${ch.name || s.channelId}\n🎬 Émission : ${s.name}\n📅 Date     : ${fmtDate(s.date)}\n🕐 Heure    : ${s.time}${s.endTime ? ' – ' + s.endTime : ''}${s.runtime ? ' (' + s.runtime + ' min)' : ''}\n🎭 Genre    : ${(s.genres || []).join(', ') || 'Non précisé'}\n\n${s.summary ? '📝 Résumé :\n' + s.summary + '\n\n' : ''}──\nEnvoyé depuis Guide TV Suisse`);
  window.location.href = 'mailto:' + encodeURIComponent(ST.email || '') + '?subject=' + sub + '&body=' + body;
}

/* SETTINGS */
function openSettings() {
  document.getElementById('sp-email').value = ST.email || '';
  renderToggles();
  document.getElementById('sp-bg').classList.add('open');
  document.getElementById('sp-panel').classList.add('open');
}
function closeSettings() { document.getElementById('sp-bg').classList.remove('open'); document.getElementById('sp-panel').classList.remove('open'); }

function renderToggles() {
  document.getElementById('ch-toggles').innerHTML = CATALOG.map(ch => {
    const on = ST.channels.some(c => c.id === ch.id);
    const fl = ch.cc === 'CH' ? '🇨🇭' : ch.cc === 'FR' ? '🇫🇷' : ch.cc === 'BE' ? '🇧🇪' : ch.cc === 'CA' ? '🍁' : '🌐';
    const logoHtml = ch.logo
      ? `<div class="ct-logo"><img src="${ch.logo}" alt="${esc(ch.name)}" onerror="this.parentElement.innerHTML='<div style=\\"width:28px;height:28px;border-radius:5px;background:${ch.color};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff\\">${esc(ch.abbr)}</div>'" style="width:100%;height:100%;object-fit:contain;padding:3px"></div>`
      : `<div style="width:32px;height:32px;border-radius:6px;background:${ch.color};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff">${esc(ch.abbr)}</div>`;
    return `<div class="ct-row">
      ${logoHtml}
      <div style="flex:1;min-width:0"><div class="ct-name">${esc(ch.name)}</div><div class="ct-cc">${fl} ${ch.cc}</div></div>
      <button class="tgl${on ? ' on' : ''}" onclick="toggleCh('${ch.id}',this)"></button>
    </div>`;
  }).join('');
}

function toggleCh(id, btn) {
  const on = ST.channels.some(c => c.id === id);
  if (on) { ST.channels = ST.channels.filter(c => c.id !== id); btn.classList.remove('on'); }
  else { const ch = CATALOG.find(c => c.id === id); if (ch) { ST.channels.push(ch); btn.classList.add('on'); } }
  saveChs(); renderGrid();
}

function saveEmail(v) { ST.email = v; LS.scfg('email', v); }
function forceRefresh() { LS.clearEPG(); ST.epgData = {}; closeSettings(); location.reload(); }
function clearCache() { LS.clearEPG(); ST.epgData = {}; alert('Cache vidé.'); }
function resetAll() { if (!confirm('Réinitialiser ?')) return; localStorage.clear(); location.reload(); }

function updateStatus() {
  const chIds = ST.channels.map(c => c.id);
  const total = chIds.length * (PAST + FUT + 1);
  let real = 0;
  for (const id of chIds) {
    const epg = ST.epgData[id];
    if (!epg) continue;
    for (const d of dateRange()) { if (epg[d] && Array.isArray(epg[d]) && epg[d].length) real++; }
  }
  const pct = total > 0 ? Math.round(real / total * 100) : 0;
  const dot = document.getElementById('st-dot'), txt = document.getElementById('st-txt');
  if (real === 0) { dot.className = 'st-dot'; txt.textContent = 'Programme indicatif uniquement'; }
  else if (pct < 50) { dot.className = 'st-dot warn'; txt.textContent = `${pct}% de données en direct · ${real}/${total} créneaux`; }
  else { dot.className = 'st-dot live'; txt.textContent = `${pct}% de données en direct · ${real}/${total} créneaux`; }
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
async function init() {
  ST.email = LS.cfg('email', '');
  loadChs();
  renderStrip();
  renderGrid();

  try {
    await loadAllEPG();
    const ok = document.getElementById('upd-ok');
    if (realCount > 0) {
      ok.style.color = 'var(--live)';
      ok.textContent = `✓  ${realCount} chaîne(s) avec données réelles`;
    } else {
      ok.style.color = 'var(--text3)';
      ok.textContent = 'ℹ️  EPG indisponible — programme indicatif';
    }
    ok.classList.add('show');
  } catch (e) {
    const ok = document.getElementById('upd-ok');
    ok.style.color = 'var(--text3)';
    ok.textContent = 'Programme indicatif chargé';
    ok.classList.add('show');
  }

  await new Promise(r => setTimeout(r, 1800));
  document.getElementById('upd').classList.add('gone');
  updateStatus();
  renderGrid();

  setInterval(() => { if (ST.mode === 'grid' && ST.date === todayStr()) renderGrid(); }, 60000);
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('sp-panel').classList.contains('open')) closeSettings();
    else if (document.getElementById('modal-sheet').classList.contains('open')) closeModal();
    else if (document.getElementById('srch-wrap').classList.contains('open')) toggleSearch();
    else if (ST.mode === 'sched') goBack();
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
