<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0b1c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guide TV">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<title>Guide TV Suisse</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0b1c;--bg2:#0e0e22;--card:#141428;--card2:#1c1c38;
  --border:rgba(255,255,255,0.08);--accent:#FF6635;--live:#00D084;--blue:#4D8EF0;
  --text:#eeeef8;--text2:#8888aa;--text3:#44445e;
  --r:13px;--rs:8px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);--safe-r:env(safe-area-inset-right,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:'Outfit','Helvetica Neue',sans-serif;
  -webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none;overflow:hidden}
button{font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:none}
input,textarea{
  font-family:inherit;-webkit-appearance:none;
  -webkit-user-select:text!important;user-select:text!important;
  -webkit-touch-callout:default!important;
}
#shell{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* UPDATE */
#upd{position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .5s,visibility .5s}
#upd.gone{opacity:0;visibility:hidden;pointer-events:none}
.upd-icon{width:76px;height:76px;border-radius:20px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:36px;
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,102,53,.4)}50%{box-shadow:0 0 0 16px rgba(255,102,53,0)}}
.upd-t{font-size:22px;font-weight:800}.upd-t em{color:var(--accent);font-style:normal}
.upd-s{font-size:13px;color:var(--text2);text-align:center;max-width:260px}
.upd-track{width:180px;height:3px;background:var(--card2);border-radius:2px;overflow:hidden}
.upd-fill{height:100%;width:0;background:var(--accent);border-radius:2px;transition:width .08s linear}
.upd-ok{font-size:13px;color:var(--live);font-weight:700;opacity:0;transition:opacity .4s}
.upd-ok.show{opacity:1}

/* TOPBAR */
#topbar{flex-shrink:0;padding-top:var(--safe-t);
  padding-left:calc(12px + var(--safe-l));padding-right:calc(12px + var(--safe-r));
  height:calc(54px + var(--safe-t));display:flex;align-items:center;gap:8px;
  background:var(--bg);border-bottom:1px solid var(--border);z-index:10}
#btn-back{display:none;width:34px;height:34px;border-radius:var(--rs);background:var(--card2);
  color:var(--text);font-size:18px;align-items:center;justify-content:center;flex-shrink:0}
#btn-back.on{display:flex}
#logo{font-size:19px;font-weight:800;flex:1;letter-spacing:-.3px}
#logo em{color:var(--accent);font-style:normal}
#ch-title{display:none;flex:1;font-size:17px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#ch-title.on{display:block}
.tb-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  background:var(--card2);border-radius:var(--rs);color:var(--text2);font-size:16px;
  transition:all .18s;flex-shrink:0}
.tb-btn.on{background:rgba(255,102,53,.2);color:var(--accent)}

/* SEARCH */
#srch-wrap{flex-shrink:0;max-height:0;overflow:hidden;background:var(--bg2);
  transition:max-height .28s ease;border-bottom:0px solid var(--border)}
#srch-wrap.open{max-height:52px;border-bottom:1px solid var(--border)}
#srch-inner{height:52px;display:flex;align-items:center;gap:8px;
  padding:0 calc(12px + var(--safe-l)) 0 calc(12px + var(--safe-r))}
#srch-in{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--text);font-size:15px;padding:8px 12px;outline:none;transition:border-color .2s}
#srch-in:focus{border-color:var(--accent)}
#srch-in::placeholder{color:var(--text3)}
#srch-x{width:28px;height:28px;color:var(--text3);font-size:17px;display:flex;align-items:center;justify-content:center}

/* DATE STRIP */
#datestrip{flex-shrink:0;height:48px;display:flex;align-items:center;gap:4px;
  overflow-x:auto;padding:0 calc(10px + var(--safe-l));scrollbar-width:none;
  background:var(--bg2);border-bottom:1px solid var(--border);scroll-behavior:smooth}
#datestrip::-webkit-scrollbar{display:none}
.dp{flex-shrink:0;padding:4px 12px;border-radius:16px;font-size:12.5px;font-weight:500;
  cursor:pointer;white-space:nowrap;color:var(--text2);border:1px solid transparent;transition:all .16s}
.dp.past{color:var(--text3)}.dp.today{border-color:var(--accent);color:var(--accent)}
.dp.sel{background:var(--accent);color:#fff;font-weight:700;border-color:var(--accent)}
.dp.past.sel{background:var(--text3);border-color:var(--text3)}

/* PANE */
#content{flex:1;overflow:hidden;position:relative}
#pane{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:10px;
  padding-bottom:calc(16px + var(--safe-b));scrollbar-width:thin;scrollbar-color:var(--card2) transparent}
#pane::-webkit-scrollbar{width:2px}
#pane::-webkit-scrollbar-thumb{background:var(--card2)}

/* GRID */
.ch-grid{display:flex;flex-direction:column;gap:7px}
.ch-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;cursor:pointer;display:flex;align-items:stretch;
  transition:transform .14s,background .14s}
.ch-card:active{transform:scale(.982);background:var(--card2)}
.ch-stripe{width:4px;flex-shrink:0}
.ch-logo{width:48px;height:48px;display:flex;align-items:center;justify-content:center;
  font-size:9.5px;font-weight:800;color:#fff;flex-shrink:0;border-radius:9px;
  margin:10px 0 10px 10px;letter-spacing:-.2px}
.ch-body{flex:1;min-width:0;padding:9px 12px 8px}
.ch-name{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--text3);margin-bottom:3px}
.ch-show{font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-row2{display:flex;align-items:center;gap:6px;margin-top:3px;font-size:12px;color:var(--text2)}
.live-pill{padding:1px 6px;background:var(--live);color:#000;border-radius:4px;font-size:9.5px;font-weight:800;letter-spacing:.3px}
.ch-prog{height:2px;background:var(--card2);border-radius:1px;margin:6px 0 3px;overflow:hidden}
.ch-prog-bar{height:100%;border-radius:1px}
.ch-nxt{font-size:11.5px;color:var(--text3);padding-top:1px}
.ch-nxt b{color:var(--text2);font-weight:500}
.ch-empty-t{color:var(--text3);font-style:italic}

/* SCHEDULE */
.sch-hdr{display:flex;align-items:center;gap:10px;padding:0 2px 14px}
.sch-hlogo{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:#fff;flex-shrink:0}
.sch-hname{font-size:18px;font-weight:800}.sch-hdate{font-size:12px;color:var(--text2);margin-top:1px}
.sch-list{display:flex;flex-direction:column}
.sch-row{display:flex;align-items:flex-start;gap:10px;padding:12px 4px;
  border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;border-radius:var(--rs)}
.sch-row:last-child{border-bottom:none}
.sch-row:active{background:var(--card)}
.sch-row.past{opacity:.35}
.sch-row.live-row{background:rgba(0,208,132,.05);border-color:rgba(0,208,132,.2);
  padding:12px 8px;margin:0 -4px;border-left:3px solid var(--live)}
.sch-row.live-row .sch-time{color:var(--live)}
.sch-tcol{width:50px;flex-shrink:0;text-align:right}
.sch-time{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.sch-tend{font-size:11px;color:var(--text3);margin-top:2px;font-variant-numeric:tabular-nums}
.sch-tl{width:16px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:5px}
.sch-dot{width:9px;height:9px;border-radius:50%;background:var(--card2);border:2px solid var(--text3);flex-shrink:0}
.sch-dot.live{background:var(--live);border-color:var(--live);box-shadow:0 0 5px var(--live)}
.sch-line{width:1px;flex:1;min-height:20px;background:var(--border);margin-top:3px}
.sch-body{flex:1;min-width:0}
.sch-name{font-size:15px;font-weight:600;line-height:1.3;color:var(--text)}
.sch-row.live-row .sch-name{color:var(--live)}
.sch-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.tag{font-size:11px;padding:2px 6px;border-radius:4px;font-weight:500}
.tag-live{background:rgba(0,208,132,.15);color:var(--live)}
.tag-g{background:rgba(77,142,240,.13);color:var(--blue)}
.tag-d{background:var(--card2);color:var(--text3)}
.demo-note{font-size:10.5px;color:var(--text3);text-align:center;padding:10px 4px 2px;font-style:italic}

/* SEARCH */
.s-empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:10px;color:var(--text3);text-align:center}
.s-empty-icon{font-size:44px}
.s-day{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text3);padding:14px 2px 6px}
.s-row{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;margin-bottom:6px;cursor:pointer;transition:background .13s}
.s-row:active{background:var(--card2)}
.s-name{font-size:14px;font-weight:600;margin-bottom:4px}
.s-meta{font-size:12px;color:var(--text2);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.s-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
mark.hl{background:rgba(255,102,53,.25);border-radius:2px;color:inherit;padding:0 1px}

/* MODAL */
#modal-bg{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#modal-bg.open{display:block}
#modal-sheet{position:fixed;bottom:0;left:0;right:0;z-index:101;background:var(--card);
  border-radius:18px 18px 0 0;border:1px solid rgba(255,255,255,.1);border-bottom:none;
  max-height:88dvh;overflow-y:auto;transform:translateY(100%);
  transition:transform .36s cubic-bezier(.32,.72,0,1);padding-bottom:calc(20px + var(--safe-b))}
#modal-sheet.open{transform:translateY(0)}
.m-pill{width:34px;height:4px;background:var(--card2);border-radius:2px;margin:10px auto 0}
.m-top{display:flex;align-items:center;gap:8px;padding:13px 16px 0}
.m-badge{height:24px;padding:0 9px;border-radius:5px;font-size:10px;font-weight:800;color:#fff;display:inline-flex;align-items:center}
.m-dt{font-size:12px;color:var(--text2);flex:1}
.m-close{width:28px;height:28px;background:var(--card2);border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.m-title{font-size:20px;font-weight:800;padding:9px 16px 5px;line-height:1.2}
.m-tags{display:flex;flex-wrap:wrap;gap:4px;padding:0 16px 10px}
.m-tag{font-size:11.5px;padding:3px 8px;border-radius:5px;background:var(--card2);color:var(--text2)}
.m-sum{font-size:13.5px;line-height:1.7;color:var(--text2);padding:0 16px 14px}
.m-div{height:1px;background:var(--border);margin:0 16px 12px}
.m-sec{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:0 16px 8px}
.rerun{display:flex;align-items:center;gap:8px;padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
.rerun:last-child{border-bottom:none}
.rerun:active{background:var(--card2)}
.rr-d{font-size:12.5px;font-weight:600;width:82px;flex-shrink:0}
.rr-t{font-size:12.5px;color:var(--text2);width:48px;flex-shrink:0;font-variant-numeric:tabular-nums}
.rr-b{font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:4px;color:#fff}
.rr-none{padding:8px 16px 4px;font-size:13px;color:var(--text3)}
.m-acts{padding:14px 16px 0}
.btn-mail{width:100%;height:46px;background:var(--accent);color:#fff;border-radius:var(--rs);
  font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity .16s}
.btn-mail:active{opacity:.8}

/* SETTINGS */
#sp-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
#sp-bg.open{display:block}
#sp-panel{position:fixed;top:0;right:0;bottom:0;z-index:201;width:min(320px,92vw);
  background:var(--card);border-left:1px solid rgba(255,255,255,.1);overflow-y:auto;
  padding-top:var(--safe-t);padding-right:var(--safe-r);padding-bottom:calc(24px + var(--safe-b));
  transform:translateX(100%);transition:transform .36s cubic-bezier(.32,.72,0,1)}
#sp-panel.open{transform:translateX(0)}
.sp-h{padding:16px 16px 13px;font-size:18px;font-weight:800;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sp-x{width:28px;height:28px;background:var(--card2);border-radius:50%;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.sp-s{padding:14px 16px;border-bottom:1px solid var(--border)}
.sp-st{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:9px}
.sp-lbl{font-size:12px;color:var(--text2);margin-bottom:4px}
.sp-in{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:14px;padding:9px 11px;outline:none;transition:border-color .2s;-webkit-user-select:text!important;user-select:text!important}
.sp-in:focus{border-color:var(--accent)}
.ct-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--border)}
.ct-row:last-child{border-bottom:none}
.ct-badge{width:34px;height:34px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0}
.ct-name{font-size:13px;font-weight:600}.ct-cc{font-size:11px;color:var(--text3);margin-top:1px}
.tgl{width:42px;height:24px;border-radius:12px;background:var(--card2);position:relative;transition:background .2s;flex-shrink:0;border:none}
.tgl.on{background:var(--accent)}
.tgl::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tgl.on::after{transform:translateX(18px)}
.sp-btn{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);color:var(--text);font-size:13.5px;text-align:left;display:flex;align-items:center;gap:8px;margin-bottom:6px;transition:background .14s}
.sp-btn:active{background:var(--card2)}
.sp-btn.red{color:#ff5566}
.sp-add{display:flex;flex-direction:column;gap:7px}
.sp-ver{text-align:center;font-size:11px;color:var(--text3);padding:14px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:160px;gap:8px;color:var(--text3);font-size:14px}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .22s ease both}
@media(min-width:600px){.ch-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}}
@media(min-width:900px){.ch-grid{grid-template-columns:1fr 1fr 1fr}}
@media(orientation:landscape) and (max-height:480px){.ch-grid{display:grid;grid-template-columns:1fr 1fr}}
@media(min-width:620px){
  #modal-sheet{max-width:540px;left:50%;right:auto;transform:translate(-50%,100%);border-radius:18px}
  #modal-sheet.open{transform:translate(-50%,0)}}
</style>
</head>
<body>
<div id="shell">
  <div id="upd">
    <div class="upd-icon">📺</div>
    <div class="upd-t">Guide <em>TV</em> Suisse</div>
    <div class="upd-s" id="upd-msg">Chargement des programmes…</div>
    <div class="upd-track"><div class="upd-fill" id="upd-fill"></div></div>
    <div class="upd-ok" id="upd-ok">✓ &nbsp;Programmes à jour</div>
  </div>
  <header id="topbar">
    <button id="btn-back" onclick="goBack()">←</button>
    <div id="logo">Guide <em style="color:var(--accent);font-style:normal">TV</em></div>
    <div id="ch-title"></div>
    <div style="display:flex;gap:6px">
      <button class="tb-btn" id="btn-srch" onclick="toggleSearch()">🔍</button>
      <button class="tb-btn" onclick="openSettings()">⚙️</button>
    </div>
  </header>
  <div id="srch-wrap">
    <div id="srch-inner">
      <input type="search" id="srch-in" placeholder="Émission, genre, chaîne…" autocomplete="off" spellcheck="false" oninput="onSearch(this.value)">
      <button id="srch-x" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <nav id="datestrip"></nav>
  <div id="content"><div id="pane"></div></div>
</div>

<div id="modal-bg" onclick="closeModal()"></div>
<div id="modal-sheet">
  <div class="m-pill"></div>
  <div class="m-top">
    <span class="m-badge" id="m-badge"></span>
    <span class="m-dt" id="m-dt"></span>
    <button class="m-close" onclick="closeModal()">✕</button>
  </div>
  <div class="m-title" id="m-title"></div>
  <div class="m-tags" id="m-tags"></div>
  <div class="m-sum" id="m-sum"></div>
  <div class="m-div"></div>
  <div class="m-sec">🔁 Rediffusions</div>
  <div id="m-reruns"></div>
  <div class="m-acts"><button class="btn-mail" onclick="sendMail()">✉️ &nbsp;Envoyer par e-mail</button></div>
</div>

<div id="sp-bg" onclick="closeSettings()"></div>
<div id="sp-panel">
  <div class="sp-h">Réglages <button class="sp-x" onclick="closeSettings()">✕</button></div>
  <div class="sp-s">
    <div class="sp-st">✉️ E-mail</div>
    <div class="sp-lbl">Adresse pour les rappels d'émissions</div>
    <input type="email" class="sp-in" id="sp-email" placeholder="vous@email.ch" oninput="saveEmail(this.value)">
  </div>
  <div class="sp-s">
    <div class="sp-st">📺 Chaînes actives</div>
    <div id="ch-toggles"></div>
  </div>
  <div class="sp-s">
    <div class="sp-st">➕ Ajouter une chaîne</div>
    <div class="sp-add">
      <div class="sp-lbl">Nom affiché</div>
      <input class="sp-in" id="add-name" placeholder="ex: RMC Découverte" type="text">
      <div class="sp-lbl" style="margin-top:4px">Code pays</div>
      <input class="sp-in" id="add-cc" placeholder="FR · CH · BE · CA" maxlength="2" type="text" style="text-transform:uppercase">
      <div class="sp-lbl" style="margin-top:4px">Couleur</div>
      <input class="sp-in" id="add-col" type="color" value="#0066cc" style="height:40px;padding:4px">
      <button class="sp-btn" style="margin-top:6px" onclick="addCh()">➕ Ajouter cette chaîne</button>
    </div>
    <div id="custom-ch-list" style="margin-top:10px"></div>
  </div>
  <div class="sp-s">
    <div class="sp-st">⚙️ Application</div>
    <button class="sp-btn" onclick="forceRefresh()">🔄 Actualiser les programmes</button>
    <button class="sp-btn" onclick="clearCache()">🗑️ Vider le cache</button>
    <button class="sp-btn red" onclick="resetAll()">↺ Réinitialiser tout</button>
  </div>
  <div class="sp-ver">Guide TV Suisse v1.2 · Données : TVMaze + programme local</div>
</div>

<script>
'use strict';
const API='https://api.tvmaze.com', TTL=6*3600000, PAST=7, FUT=7;
const MIN_API_SHOWS=4; // Si TVMaze renvoie moins, on complète avec les données locales

/* ═══════════════════════════════════════════════════════════════
   CATALOGUE DE BASE (jamais modifié — les customs vont dans CUSTOM_CATALOG)

function parseLocal(chId) {
  const lines = LOCAL[chId];
  if (!lines) return null;
  return lines.map((line, uid) => {
    const p = line.split('|');
    const time = p[0], name = p[1], genre = p[2], dur = parseInt(p[3]) || 30;
    const [h, m] = time.split(':').map(Number);
    const tot = h * 60 + m + dur;
    const et = pad(Math.floor(tot / 60) % 24) + ':' + pad(tot % 60);
    return {
      _id: 'L:' + chId + ':' + uid, _demo: true, channelId: chId,
      date: null, time, endTime: et, runtime: dur,
      name, showName: name, genres: [genre],
      summary: DESC[genre] || DESC.Magazine, showId: null,
    };
  });
}

// Cache parsed local data
const _localCache = {};
function getLocal(chId) {
  if (!_localCache[chId]) _localCache[chId] = parseLocal(chId);
  return _localCache[chId];
}

async function fetchTVM(cc, date) {
  const key = 's:' + cc + '_' + date;
  const cached = LS.getSched(key);
  if (cached) { ST.cache[cc + '_' + date] = cached; return cached; }
  try {
    const r = await fetch(API + '/schedule?country=' + cc + '&date=' + date);
    if (!r.ok) throw 0;
    const raw = await r.json();
    const norm = raw.map(ep => {
      const sh = ep.show || {}, net = sh.network || sh.webChannel || {};
      const name = (sh.name && ep.name && ep.name !== sh.name) ? sh.name + ' — ' + ep.name : (sh.name || ep.name || '');
      return {
        _id: ep.id, _demo: false, channelId: null, tvName: net.name || '',
        date: ep.airdate, time: ep.airtime || '00:00',
        endTime: addMins(ep.airtime, ep.runtime), runtime: ep.runtime || 0,
        name, showName: sh.name || '', genres: sh.genres || [],
        summary: strip(sh.summary || ''), showId: sh.id || null,
      };
    });
    LS.setSched(key, norm);
    ST.cache[cc + '_' + date] = norm;
    return norm;
  } catch { return null; }
}

async function loadAll() {
  const dates = dateRange();
  const ccs = [...new Set(ST.channels.map(c => c.cc))];
  await Promise.allSettled(dates.flatMap(d => ccs.map(cc => fetchTVM(cc, d))));
}

function getShows(chId, date) {
  const ch = CATALOG.find(c => c.id === chId);
  if (!ch) return [];

  // Try TVMaze
  const api = ST.cache[ch.cc + '_' + date];
  if (api) {
    const f = api.filter(e => e.tvName === ch.tv).map(e => ({ ...e, channelId: chId, date }));
    if (f.length >= MIN_API_SHOWS) return f.sort((a, b) => a.time.localeCompare(b.time));
  }

  // Use local schedule data (better than random demo)
  const local = getLocal(chId);
  if (local) return local.map(s => ({ ...s, date }));

  // Final fallback: generic rotating demo
  return genericDemo(chId, date);
}

function nowMins() { const n = new Date(); return n.getHours() * 60 + n.getMinutes(); }
function t2m(t = '') { if (!t) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + m; }

function isLive(s, date) {
  if (date !== todayStr()) return false;
  const nm = nowMins(), st = t2m(s.time);
  const en = s.endTime ? t2m(s.endTime) : st + (s.runtime || 30);
  const enAdj = en <= st ? en + 1440 : en;
  return nm >= st && nm < enAdj;
}
function isPast(s, date) {
  const t = todayStr();
  if (date < t) return true; if (date > t) return false;
  const nm = nowMins(), st = t2m(s.time);
  const en = s.endTime ? t2m(s.endTime) : st + (s.runtime || 30);
  const enAdj = en <= st ? en + 1440 : en;
  return nm >= enAdj;
}
function progress(s) {
  const nm = nowMins(), st = t2m(s.time);
  const en = s.endTime ? t2m(s.endTime) : st + (s.runtime || 30);
  const dur = (en <= st ? en + 1440 : en) - st;
  return dur <= 0 ? 0 : Math.min(100, Math.max(0, ((nm - st) / dur) * 100));
}
function nowShows(chId, date) {
  const shows = getShows(chId, date), t = todayStr(), nm = nowMins();
  if (!shows.length) return { cur: null, nxt: null };
  if (date !== t) return { cur: shows[0] || null, nxt: shows[1] || null };
  let cur = null, nxt = null;
  for (let i = 0; i < shows.length; i++) {
    const s = shows[i], st = t2m(s.time), en = s.endTime ? t2m(s.endTime) : st + (s.runtime || 30);
    const enAdj = en <= st ? en + 1440 : en;
    if (nm >= st && nm < enAdj) { cur = s; nxt = shows[i + 1] || null; break; }
    if (st > nm && !nxt) { nxt = s; if (i > 0) cur = shows[i - 1]; }
  }
  if (!cur && shows.length) cur = shows[shows.length - 1];
  return { cur, nxt };
}
function findReruns(show) {
  const out = [], tgt = (show.showName || show.name || '').toLowerCase(), seen = new Set();
  for (const d of dateRange()) {
    for (const ch of ST.channels) {
      for (const s of getShows(ch.id, d)) {
        if ((s.showName || s.name || '').toLowerCase() !== tgt) continue;
        if (s.date === show.date && s.time === show.time && ch.id === show.channelId) continue;
        const k = s.date + '|' + s.time + '|' + ch.id; if (seen.has(k)) continue; seen.add(k);
        out.push({ ...s, channelId: ch.id, chObj: ch });
      }
    }
  }
  return out.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time)).slice(0, 12);
}
function searchAll(q) {
  if (!q || q.length < 2) return [];
  const qn = norm(q); const out = [], seen = new Set();
  for (const d of dateRange()) {
    for (const ch of ST.channels) {
      for (const s of getShows(ch.id, d)) {
        if (!norm(s.name + ' ' + s.genres.join(' ') + ' ' + s.summary).includes(qn)) continue;
        const k = s.name + '|' + d + '|' + s.time + '|' + ch.id; if (seen.has(k)) continue; seen.add(k);
        out.push({ ...s, channelId: ch.id, chObj: ch });
      }
    }
  }
  return out.sort((a, b) => new Date(a.date + 'T' + a.time) - new Date(b.date + 'T' + b.time));
}

// Helpers
function todayStr() { return new Date().toISOString().slice(0, 10); }
function offDay(n) { const d = new Date(); d.setDate(d.getDate() + n); return d.toISOString().slice(0, 10); }
function dateRange() { return Array.from({ length: PAST + FUT + 1 }, (_, i) => offDay(-PAST + i)); }
function pad(n) { return String(n).padStart(2, '0'); }
function addMins(t, m) { if (!t || !m) return ''; const [h, min] = t.split(':').map(Number), tot = h * 60 + min + m; return pad(Math.floor(tot / 60) % 24) + ':' + pad(tot % 60); }
function strip(h) { return h.replace(/<[^>]*>/g, '').replace(/&amp;/g, '&').replace(/&nbsp;/g, ' ').trim(); }
function norm(s = '') { return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }
function esc(s = '') { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function hl(text, q) { if (!q) return esc(text); const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi'); return esc(text).replace(re, '<mark class="hl">$1</mark>'); }
function fmtDate(ds, short = false) {
  const t = todayStr();
  if (ds === t) return 'Aujourd\'hui';
  if (ds === offDay(-1)) return 'Hier';
  if (ds === offDay(1)) return 'Demain';
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('fr-CH', short ? { weekday: 'short', day: 'numeric', month: 'short' } : { weekday: 'long', day: 'numeric', month: 'long' });
}
function fmtStrip(ds) {
  const t = todayStr();
  if (ds === t) return 'Aujourd\'hui'; if (ds === offDay(-1)) return 'Hier'; if (ds === offDay(1)) return 'Demain';
  const d = new Date(ds + 'T12:00:00'), wd = d.toLocaleDateString('fr-CH', { weekday: 'short' });
  return wd[0].toUpperCase() + wd.slice(1) + ' ' + d.getDate();
}

// Date strip
function renderStrip() {
  const t = todayStr(), el = document.getElementById('datestrip');
  el.innerHTML = dateRange().map(d => {
    const past = d < t, isT = d === t, sel = d === ST.date;
    return `<div class="dp${past ? ' past' : ''}${isT ? ' today' : ''}${sel ? ' sel' : ''}" onclick="selDate('${d}')">${fmtStrip(d)}</div>`;
  }).join('');
  setTimeout(() => { const a = el.querySelector('.sel'); if (a) a.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' }); }, 120);
}
function selDate(d) { ST.date = d; renderStrip(); if (ST.mode === 'grid') renderGrid(); else if (ST.mode === 'sched') renderSched(ST.chId); }

// Grid
function renderGrid() {
  const pane = document.getElementById('pane');
  if (!ST.channels.length) { pane.innerHTML = '<div class="empty">📺<span>Aucune chaîne — ouvrez Réglages</span></div>'; return; }
  pane.innerHTML = '<div class="ch-grid">' + ST.channels.map((ch, i) => {
    const { cur, nxt } = nowShows(ch.id, ST.date);
    const live = cur && isLive(cur, ST.date);
    const pct = live ? progress(cur).toFixed(1) : 0;
    return `<div class="ch-card fu" style="animation-delay:${i * .03}s" onclick="openSched('${ch.id}')">
      <div class="ch-stripe" style="background:${ch.color}"></div>
      <div class="ch-logo" style="background:${ch.color}">${esc(ch.abbr)}</div>
      <div class="ch-body">
        <div class="ch-name">${esc(ch.name)}</div>
        <div class="ch-show">${cur ? esc(cur.name) : '<span class="ch-empty-t">Aucune émission</span>'}</div>
        ${cur ? `<div class="ch-row2">${live ? '<span class="live-pill">EN DIRECT</span>' : ''}<span>${cur.time}${cur.endTime ? ' – ' + cur.endTime : ''}</span></div>` : ''}
        ${live ? `<div class="ch-prog"><div class="ch-prog-bar" style="width:${pct}%;background:${ch.color};opacity:.8"></div></div>` : '<div style="height:5px"></div>'}
        ${nxt ? `<div class="ch-nxt">→ ${nxt.time}&nbsp;<b>${esc(nxt.name)}</b></div>` : '<div style="height:2px"></div>'}
      </div>
    </div>`;
  }).join('') + '</div>';
}

// 24h schedule
function openSched(chId) {
  ST.mode = 'sched'; ST.chId = chId;
  const ch = CATALOG.find(c => c.id === chId) || {};
  document.getElementById('logo').style.display = 'none';
  const ct = document.getElementById('ch-title'); ct.textContent = ch.name || chId; ct.classList.add('on');
  document.getElementById('btn-back').classList.add('on');
  renderSched(chId);
}
function renderSched(chId) {
  const pane = document.getElementById('pane');
  const ch = CATALOG.find(c => c.id === chId) || {};
  const shows = getShows(chId, ST.date), t = todayStr(), nm = nowMins();
  const hasAPI = ST.cache[ch.cc + '_' + ST.date] && ST.cache[ch.cc + '_' + ST.date].filter(e => e.tvName === ch.tv).length >= MIN_API_SHOWS;
  let html = `<div class="sch-hdr fu">
    <div class="sch-hlogo" style="background:${ch.color || '#444'}">${esc(ch.abbr || '?')}</div>
    <div><div class="sch-hname">${esc(ch.name || chId)}</div><div class="sch-hdate">${fmtDate(ST.date)}</div></div>
  </div>
  ${!hasAPI ? '<div class="demo-note">Programme indicatif — données TVMaze indisponibles pour cette chaîne</div>' : ''}`;
  if (!shows.length) { html += '<div class="empty">😕<span>Aucune émission ce jour</span></div>'; pane.innerHTML = html; return; }
  html += '<div class="sch-list fu">';
  shows.forEach((s, i) => {
    const live = isLive(s, ST.date), past = !live && isPast(s, ST.date);
    const cls = 'sch-row' + (past ? ' past' : '') + (live ? ' live-row' : '');
    const sid = stash({ ...s, channelId: chId, chObj: ch });
    html += `<div class="${cls}" onclick="openModal('${sid}')">
      <div class="sch-tcol"><div class="sch-time">${s.time}</div>${s.endTime ? `<div class="sch-tend">${s.endTime}</div>` : ''}</div>
      <div class="sch-tl"><div class="sch-dot${live ? ' live' : ''}"></div>${i < shows.length - 1 ? '<div class="sch-line"></div>' : ''}</div>
      <div class="sch-body">
        <div class="sch-name">${esc(s.name)}</div>
        <div class="sch-tags">
          ${live ? '<span class="tag tag-live">EN DIRECT</span>' : ''}
          ${s.genres.map(g => `<span class="tag tag-g">${esc(g)}</span>`).join('')}
          ${s.runtime ? `<span class="tag tag-d">${s.runtime} min</span>` : ''}
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  pane.innerHTML = html;
  if (ST.date === t) setTimeout(() => {
    const lv = pane.querySelector('.live-row');
    if (lv) lv.scrollIntoView({ block: 'center', behavior: 'smooth' });
    else { const rows = pane.querySelectorAll('.sch-row:not(.past)'); if (rows[0]) rows[0].scrollIntoView({ block: 'start', behavior: 'smooth' }); }
  }, 200);
}
function goBack() {
  ST.mode = 'grid'; ST.chId = null;
  document.getElementById('logo').style.display = '';
  document.getElementById('ch-title').classList.remove('on');
  document.getElementById('btn-back').classList.remove('on');
  renderGrid();
}

// Search
function toggleSearch() {
  ST.searching = !ST.searching;
  const wrap = document.getElementById('srch-wrap'), btn = document.getElementById('btn-srch');
  if (ST.searching) { wrap.classList.add('open'); btn.classList.add('on'); ST.mode = 'search'; renderSearchEmpty(); setTimeout(() => document.getElementById('srch-in').focus(), 300); }
  else { wrap.classList.remove('open'); btn.classList.remove('on'); document.getElementById('srch-in').value = ''; ST.query = ''; ST.mode = ST.chId ? 'sched' : 'grid'; if (ST.chId) renderSched(ST.chId); else renderGrid(); }
}
function clearSearch() { document.getElementById('srch-in').value = ''; ST.query = ''; renderSearchEmpty(); }
function onSearch(q) { ST.query = q; if (!q) { renderSearchEmpty(); return; } renderSearchResults(searchAll(q), q); }
function renderSearchEmpty() {
  document.getElementById('pane').innerHTML = `<div class="s-empty"><div class="s-empty-icon">🔍</div><div>Tapez pour chercher une émission, un genre ou une chaîne sur 2 semaines.</div></div>`;
}
function renderSearchResults(res, q) {
  const pane = document.getElementById('pane');
  if (!res.length) { pane.innerHTML = `<div class="s-empty"><div class="s-empty-icon">😕</div><div>Aucun résultat pour « ${esc(q)} »</div></div>`; return; }
  const by = {}; res.forEach(r => { (by[r.date] || (by[r.date] = [])).push(r); });
  let html = '<div class="fu">';
  for (const [d, items] of Object.entries(by)) {
    html += `<div class="s-day">${fmtDate(d)}</div>`;
    items.forEach(item => {
      const ch = item.chObj || CATALOG.find(c => c.id === item.channelId) || {};
      const sid = stash({ ...item, chObj: ch });
      html += `<div class="s-row" onclick="openModal('${sid}')">
        <div class="s-name">${hl(item.name, q)}</div>
        <div class="s-meta"><span class="s-dot" style="background:${ch.color || '#888'}"></span><span>${esc(ch.name || item.channelId)}</span><span>${item.time}${item.endTime ? ' – ' + item.endTime : ''}</span>${item.genres.map(g => `<span class="tag tag-g" style="font-size:10.5px">${esc(g)}</span>`).join('')}</div>
      </div>`;
    });
  }
  pane.innerHTML = html + '</div>';
}

// Modal
function openModal(sid) {
  const s = pop(sid); if (!s) return;
  ST.modal = s;
  const ch = s.chObj || CATALOG.find(c => c.id === s.channelId) || {};
  document.getElementById('m-badge').textContent = ch.abbr || '?';
  document.getElementById('m-badge').style.background = ch.color || '#666';
  document.getElementById('m-dt').textContent = `${ch.name || ''} · ${fmtDate(s.date, true)} · ${s.time}${s.endTime ? ' – ' + s.endTime : ''}${s.runtime ? ' (' + s.runtime + ' min)' : ''}`;
  document.getElementById('m-title').textContent = s.name || '';
  document.getElementById('m-tags').innerHTML = (s.genres || []).map(g => `<span class="m-tag">${esc(g)}</span>`).join('');
  document.getElementById('m-sum').textContent = s.summary || 'Aucune description disponible.';
  const reruns = findReruns(s), rc = document.getElementById('m-reruns');
  if (reruns.length) {
    rc.innerHTML = reruns.map(r => {
      const rc2 = r.chObj || CATALOG.find(c => c.id === r.channelId) || {};
      return `<div class="rerun" onclick="closeModal();selDate('${r.date}');openSched('${r.channelId || rc2.id}')">
        <div class="rr-d">${fmtDate(r.date, true)}</div><div class="rr-t">${r.time}</div>
        <div class="rr-b" style="background:${rc2.color || '#555'}">${esc(rc2.abbr || '?')}</div>
      </div>`;
    }).join('');
  } else { rc.innerHTML = '<div class="rr-none">Aucune rediffusion sur 2 semaines.</div>'; }
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('modal-sheet').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); document.getElementById('modal-sheet').classList.remove('open'); ST.modal = null; }

function sendMail() {
  const s = ST.modal; if (!s) return;
  const ch = s.chObj || CATALOG.find(c => c.id === s.channelId) || {};
  const sub = encodeURIComponent('[Guide TV] ' + s.name + ' – ' + fmtDate(s.date));
  const body = encodeURIComponent('Émission sélectionnée depuis Guide TV Suisse\n\n' + '📺 Chaîne   : ' + (ch.name || s.channelId) + '\n' + '🎬 Émission : ' + s.name + '\n' + '📅 Date     : ' + fmtDate(s.date) + '\n' + '🕐 Heure    : ' + s.time + (s.endTime ? ' – ' + s.endTime : '') + (s.runtime ? ' (' + s.runtime + ' min)' : '') + '\n' + '🎭 Genre    : ' + ((s.genres || []).join(', ') || 'Non précisé') + '\n\n' + (s.summary ? '📝 Résumé :\n' + s.summary + '\n\n' : '') + '──\nEnvoyé depuis Guide TV Suisse');
  window.location.href = 'mailto:' + encodeURIComponent(ST.email || '') + '?subject=' + sub + '&body=' + body;
}

// Settings
function openSettings() {
  document.getElementById('sp-email').value = ST.email || '';
  renderToggles();
  renderCustomList();
  document.getElementById('sp-bg').classList.add('open');
  document.getElementById('sp-panel').classList.add('open');
}
function closeSettings() { document.getElementById('sp-bg').classList.remove('open'); document.getElementById('sp-panel').classList.remove('open'); }

function renderToggles() {
  document.getElementById('ch-toggles').innerHTML = CATALOG.map(ch => {
    const on = ST.channels.some(c => c.id === ch.id);
    const fl = ch.cc === 'CH' ? '🇨🇭' : ch.cc === 'FR' ? '🇫🇷' : ch.cc === 'BE' ? '🇧🇪' : ch.cc === 'CA' ? '🍁' : '🌐';
    return `<div class="ct-row">
      <div class="ct-badge" style="background:${ch.color}">${esc(ch.abbr)}</div>
      <div style="flex:1;min-width:0"><div class="ct-name">${esc(ch.name)}</div><div class="ct-cc">${fl} ${ch.cc}</div></div>
      <button class="tgl${on ? ' on' : ''}" onclick="toggleCh('${ch.id}',this)"></button>
    </div>`;
  }).join('');
}
function renderCustomList() {
  const customs = getCustomChannels();
  const el = document.getElementById('custom-ch-list');
  if (!customs.length) { el.innerHTML = ''; return; }
  el.innerHTML = '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:8px;margin-top:4px">Mes chaînes ajoutées</div>' +
    customs.map(ch => `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
      <div style="width:30px;height:30px;border-radius:6px;background:${ch.color};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0">${esc(ch.abbr)}</div>
      <div style="flex:1;font-size:13px">${esc(ch.name)}</div>
      <button onclick="removeCustomCh('${ch.id}')" style="color:#ff5566;font-size:18px;width:28px;height:28px;display:flex;align-items:center;justify-content:center">✕</button>
    </div>`).join('');
}

function toggleCh(id, btn) {
  const on = ST.channels.some(c => c.id === id);
  if (on) { ST.channels = ST.channels.filter(c => c.id !== id); btn.classList.remove('on'); }
  else { const ch = CATALOG.find(c => c.id === id); if (ch) { ST.channels.push(ch); btn.classList.add('on'); } }
  saveChs(); renderGrid();
}

function addCh() {
  const name = document.getElementById('add-name').value.trim();
  const cc = (document.getElementById('add-cc').value.trim() || 'FR').toUpperCase().slice(0, 2);
  const color = document.getElementById('add-col').value || '#0066cc';
  if (!name) { alert('Entrez un nom de chaîne.'); return; }
  const id = 'x' + Date.now();
  const abbr = name.replace(/[^A-Za-z0-9]/g, '').slice(0, 4).toUpperCase() || name.slice(0, 4).toUpperCase();
  // tv = name for TVMaze matching attempt (user can refine)
  const ch = { id, name, tv: name, cc, color, abbr, _custom: true };

  // Save to persistent storage
  const customs = getCustomChannels();
  customs.push(ch);
  saveCustomChannels(customs);

  // Add to live catalog & active channels
  if (!CATALOG.find(c => c.id === id)) CATALOG.push(ch);
  ST.channels.push(ch);
  saveChs();

  // Clear form
  document.getElementById('add-name').value = '';
  document.getElementById('add-cc').value = '';

  renderToggles();
  renderCustomList();
  renderGrid();
  alert('✅ ' + name + ' ajoutée et sauvegardée !');
}

function removeCustomCh(id) {
  if (!confirm('Supprimer cette chaîne ?')) return;
  const customs = getCustomChannels().filter(c => c.id !== id);
  saveCustomChannels(customs);
  CATALOG = [...BASE_CATALOG, ...customs];
  ST.channels = ST.channels.filter(c => c.id !== id);
  saveChs();
  renderToggles();
  renderCustomList();
  renderGrid();
}

function saveEmail(v) { ST.email = v; LS.scfg('email', v); }
function forceRefresh() { LS.clearSched(); ST.cache = {}; closeSettings(); location.reload(); }
function clearCache() { LS.clearSched(); ST.cache = {}; alert('Cache vidé. Les données seront rechargées au prochain démarrage.'); }
function resetAll() { if (!confirm('Réinitialiser toute l\'application ?')) return; localStorage.clear(); location.reload(); }

function animBar(ms) {
  const fill = document.getElementById('upd-fill');
  const step = 40, total = ms / step; let n = 0;
  const iv = setInterval(() => { n++; fill.style.width = Math.min(100, (n / total * 100).toFixed(1)) + '%'; if (n >= total) clearInterval(iv); }, step);
}

async function init() {
  ST.email = LS.cfg('email', '');
  // 1. Load custom channels into CATALOG FIRST
  loadCustomChannels();
  // 2. Then load active channel IDs (needs full CATALOG)
  loadChs();
  renderStrip();
  renderGrid();
  animBar(1800);

  const msg = document.getElementById('upd-msg'), ok = document.getElementById('upd-ok');
  try {
    await loadAll();
    msg.textContent = 'Mise à jour terminée !';
    ok.classList.add('show');
  } catch {
    msg.textContent = 'Programme local chargé';
    ok.textContent = 'ℹ️  TVMaze indisponible';
    ok.classList.add('show');
  }
  await new Promise(r => setTimeout(r, 2000));
  document.getElementById('upd').classList.add('gone');
  renderGrid();
  setInterval(() => { if (ST.mode === 'grid' && ST.date === todayStr()) renderGrid(); }, 60000);
  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    if (document.getElementById('sp-panel').classList.contains('open')) closeSettings();
    else if (document.getElementById('modal-sheet').classList.contains('open')) closeModal();
    else if (ST.searching) toggleSearch();
    else if (ST.mode === 'sched') goBack();
  });
}
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
